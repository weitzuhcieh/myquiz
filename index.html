<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <meta name="supported-color-schemes" content="light">
  <title>生字出題器</title>
  <link rel="stylesheet" href="./styles.css?v=20260405f">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">國小三下國語</p>
        <h1>生字出題器</h1>
        <p class="hero-text">一題一頁、逐字作答，全部完成後再集中檢查答案。</p>
      </div>
    </header>

    <main class="layout">
      <aside class="lesson-panel">
        <div class="panel-heading">
          <div class="lesson-heading-copy">
            <h2>課程</h2>
            <p id="mode-indicator">目前模式：人工判讀</p>
          </div>
          <button id="toggle-lesson-panel" class="secondary-button lesson-toggle-button" type="button" aria-label="縮起課程欄" title="縮起課程欄">⇤</button>
        </div>
        <div id="lesson-list" class="lesson-list" aria-label="課程列表"></div>
      </aside>

      <section class="quiz-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">作答區</p>
            <h2 id="lesson-title">請先選擇課程</h2>
          </div>
          <div class="score-card">
            <span id="score-label">0 / 0</span>
            <span id="score-subtitle">進度</span>
          </div>
        </div>

        <p id="lesson-description" class="lesson-description">選課後會從第一題開始作答。</p>
        <div class="inline-tools">
          <button id="bank-button" class="secondary-button" type="button">檢視本課題庫</button>
        </div>

        <section id="question-stage" class="stage-card" hidden>
          <div class="stage-top">
            <span id="question-progress" class="stage-progress"></span>
            <span id="question-hint" class="stage-hint"></span>
          </div>
          <p id="question-sentence" class="stage-sentence"></p>
          <div class="char-status">
            <span id="char-progress" class="stage-progress"></span>
            <button id="prev-button" class="secondary-button nav-button nav-button-inline" type="button">上一題</button>
            <button id="next-button" class="secondary-button nav-button nav-button-inline" type="button">下一題</button>
            <span id="char-label" class="stage-hint"></span>
          </div>
          <div class="canvas-wrap canvas-wrap--inline">
            <canvas id="handwriting-canvas" width="900" height="900" aria-label="手寫畫布"></canvas>
            <div class="canvas-tools">
              <button id="clear-canvas-button" class="secondary-button utility-button icon-button canvas-icon-button" type="button" aria-label="清除重寫" title="清除重寫">
                <span class="icon-button-mark" aria-hidden="true">↺</span>
              </button>
              <button id="expand-canvas-button" class="secondary-button utility-button icon-button canvas-icon-button canvas-icon-button--mid" type="button" aria-label="放大書寫" title="放大書寫">
                <span id="expand-icon-mark" class="icon-button-mark" aria-hidden="true">⤢</span>
              </button>
              <button id="submit-answer-button" class="primary-button submit-button icon-button canvas-icon-button" type="button" aria-label="送出這一題" title="送出這一題">
                <span id="submit-icon-mark" class="icon-button-mark" aria-hidden="true">✿</span>
              </button>
            </div>
          </div>
        </section>

        <section id="review-stage" class="review-stage" hidden>
          <div class="review-header">
            <div>
              <p class="eyebrow">全部完成</p>
              <h2>答案檢查</h2>
            </div>
            <button id="restart-button" class="secondary-button" type="button">重新練習本課</button>
          </div>
          <div id="review-list" class="review-list"></div>
        </section>
      </section>
    </main>
  </div>

  <div id="bank-dialog" class="overlay-sheet" hidden>
    <div class="sheet-card">
      <div class="sheet-header">
        <div>
          <p class="eyebrow">題庫內容</p>
          <h2 id="bank-title">本課題庫</h2>
        </div>
        <button id="close-bank-button" class="secondary-button" type="button">關閉</button>
      </div>
      <form id="bank-form" class="bank-form">
        <div class="bank-form-heading">
          <div>
            <p class="bank-form-kicker">題庫維護</p>
            <h3 id="bank-form-title" class="bank-form-title">手動新增題目</h3>
          </div>
          <button id="cancel-bank-edit-button" class="secondary-button" type="button" hidden>取消編輯</button>
        </div>
        <div class="bank-form-grid">
          <label class="bank-field bank-field--full" for="bank-sentence-input">
            <span class="bank-field-label">句子</span>
            <textarea
              id="bank-sentence-input"
              class="bank-input bank-textarea"
              rows="3"
              placeholder="例如：三個角落各有一個像回字形的方塊。"
              required
            ></textarea>
          </label>
          <label class="bank-field" for="bank-answer-input">
            <span class="bank-field-label">要考的單字或詞語</span>
            <input
              id="bank-answer-input"
              class="bank-input"
              type="text"
              inputmode="text"
              placeholder="例如：回"
              required
            >
          </label>
          <label class="bank-field" for="bank-hint-input">
            <span class="bank-field-label">注音</span>
            <input
              id="bank-hint-input"
              class="bank-input"
              type="text"
              inputmode="text"
              placeholder="可手動輸入，或直接點下面注音符號"
            >
          </label>
          <div class="bank-field bank-field--full">
            <span class="bank-field-label">注音符號表</span>
            <div id="bopomofo-toolbar" class="bopomofo-toolbar" aria-label="注音符號工具列">
              <button type="button" class="secondary-button bopomofo-tool" data-bopomofo-action="space">空格</button>
              <button type="button" class="secondary-button bopomofo-tool" data-bopomofo-action="backspace">刪一個</button>
              <button type="button" class="secondary-button bopomofo-tool" data-bopomofo-action="clear">清空</button>
            </div>
            <div id="bopomofo-palette" class="bopomofo-palette" aria-label="注音符號表"></div>
          </div>
        </div>
        <div class="bank-form-actions">
          <p id="bank-form-status" class="bank-form-status">輸入句子和要考的字詞後，再用注音欄或下方符號表手動拼出注音。</p>
          <button id="add-bank-item-button" class="primary-button" type="submit">新增到本課題庫</button>
        </div>
      </form>
      <div id="bank-list" class="bank-list"></div>
    </div>
  </div>

  <template id="review-template">
    <article class="review-card">
      <header class="review-card-header">
        <span class="review-index"></span>
        <span class="review-result">人工核對</span>
      </header>
      <p class="review-sentence"></p>
      <div class="compare-panel">
        <div class="compare-box">
          <p class="compare-label">手寫內容</p>
          <div class="compare-canvas-list"></div>
        </div>
        <div class="compare-box">
          <p class="compare-label">正確答案</p>
          <p class="compare-answer"></p>
          <p class="compare-hint"></p>
        </div>
      </div>
    </article>
  </template>

  <script src="./lessons.js?v=20260405a"></script>
  <script src="./app.js?v=20260405c"></script>
</body>
</html>
